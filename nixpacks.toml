[variables]
PYTHONPATH = "/app:/app/backend"

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade || true",
  "if [ -f backend/requirements.txt ]; then python3 -m pip install --no-cache-dir -r backend/requirements.txt; else python3 -m pip install --no-cache-dir -r requirements.txt; fi"
]

[start]
cmd = "cd backend && gunicorn run:app --bind 0.0.0.0:${PORT:-5001} --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-120}"
